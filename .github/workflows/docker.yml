name: Build & Push Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/boiz-weekend-manager:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/boiz-weekend-manager:${{ github.sha }}

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/boiz-weekend-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/boiz-weekend-backend:${{ github.sha }}

  deploy:
    # Trigger Watchtower's HTTP API on the HTPC so it pulls + restarts the
    # two boiz images immediately. Scoped via ?image=... so the schedule
    # (nightly 4am for everything else) is not affected.
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: ${{ vars.WATCHTOWER_URL != '' }}
    steps:
      # The Cloudflare→Traefik→Watchtower hop occasionally 5xx's. Retry hard
      # (~4 min window). The images are already on Docker Hub at this point,
      # so a webhook that still fails is best-effort: it must NOT mark the
      # whole workflow red (Watchtower's nightly run + a manual trigger both
      # catch up). Hence the trailing `|| echo` to keep the step green.
      - name: Update backend
        run: |
          curl -fsS --max-time 90 \
            --retry 8 --retry-delay 15 --retry-all-errors --retry-max-time 240 \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" \
            "${{ vars.WATCHTOWER_URL }}/v1/update?image=${{ secrets.DOCKERHUB_USERNAME }}/boiz-weekend-backend" \
            || echo "::warning::backend deploy webhook failed — Watchtower nightly/manual will catch up"
      - name: Wait for backend
        run: sleep 8
      - name: Update frontend
        run: |
          curl -fsS --max-time 90 \
            --retry 8 --retry-delay 15 --retry-all-errors --retry-max-time 240 \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" \
            "${{ vars.WATCHTOWER_URL }}/v1/update?image=${{ secrets.DOCKERHUB_USERNAME }}/boiz-weekend-manager" \
            || echo "::warning::frontend deploy webhook failed — Watchtower nightly/manual will catch up"
