name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  # Default path: uses the OAuth token (counts against the Claude.ai Pro/Max
  # subscription). Triggered by @claude but NOT by @claude-api.
  claude-oauth:
    if: |
      github.event.sender.login == github.repository_owner && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude-api')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude-api')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && !contains(github.event.review.body, '@claude-api')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && !contains(github.event.issue.body, '@claude-api') && !contains(github.event.issue.title, '@claude-api'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        env:
          # gh CLI auto-auths off this; needed so Claude can `gh pr create`
          # and `gh pr merge --auto` without a separate login step.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: |
            Bash(gh:*)
            Bash(git:*)
            Bash(npm:*)
            Bash(curl:*)

  # Fallback path: uses the pay-per-use Anthropic API key (charged against
  # the $20 credit balance). Triggered explicitly by @claude-api.
  claude-api:
    if: |
      github.event.sender.login == github.repository_owner && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-api')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-api')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude-api')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude-api') || contains(github.event.issue.title, '@claude-api')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: '@claude-api'
          allowed_tools: |
            Bash(gh:*)
            Bash(git:*)
            Bash(npm:*)
            Bash(curl:*)
