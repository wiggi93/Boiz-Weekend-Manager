<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#26262b"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </radialGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc94a"/>
      <stop offset="60%" stop-color="#f5a524"/>
      <stop offset="100%" stop-color="#b97a0a"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Beer mug -->
  <g transform="translate(108 104)">
    <!-- Handle -->
    <path d="M 230 90
             Q 320 90 320 180
             L 320 240
             Q 320 320 230 320
             L 230 280
             Q 280 280 280 240
             L 280 180
             Q 280 130 230 130 Z"
          fill="url(#beer)"/>

    <!-- Mug body (rounded rectangle, slightly tapered) -->
    <path d="M 16 80
             L 244 80
             L 232 332
             Q 230 360 200 360
             L 60 360
             Q 30 360 28 332 Z"
          fill="url(#beer)"/>

    <!-- Vertical highlight on body -->
    <path d="M 50 110
             L 60 110
             L 56 320
             L 46 320 Z"
          fill="#ffffff" opacity="0.35"/>

    <!-- Foam (bold rounded bubbles on top) -->
    <g>
      <circle cx="44"  cy="78" r="42" fill="#ffffff"/>
      <circle cx="100" cy="58" r="50" fill="#ffffff"/>
      <circle cx="160" cy="62" r="46" fill="#ffffff"/>
      <circle cx="216" cy="76" r="40" fill="#ffffff"/>
      <!-- Subtle inner shading on foam -->
      <circle cx="100" cy="62" r="46" fill="#ffffff"/>
    </g>

    <!-- Single bubble inside beer for character -->
    <circle cx="170" cy="220" r="10" fill="#ffffff" opacity="0.35"/>
    <circle cx="190" cy="260" r="6"  fill="#ffffff" opacity="0.30"/>
  </g>
</svg>
